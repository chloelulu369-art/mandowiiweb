<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Juego Clicker</title>
  <style>
    #mapa {
      width: 400px;
      height: 400px;
      border: 2px solid #333;
      position: relative;
      margin: 20px auto;
    }
    .target {
      width: 30px;
      height: 30px;
      background: red;
      border-radius: 50%;
      position: absolute;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Juego Clicker</h1>
  <p id="info"></p>
  <div id="mapa"></div>
  <audio id="player" controls autoplay></audio>

  <script>
    let clicks = 0;
    let startTime = Date.now();
    let bestTime = localStorage.getItem("bestTime") || Infinity;
    let juegoActivo = true;

    // Mostrar canción seleccionada
    const song = JSON.parse(localStorage.getItem("cancionSeleccionada"));
    const info = document.getElementById("info");
    const player = document.getElementById("player");

    if (song) {
      info.textContent = `Jugando con: ${song.trackName} - ${song.artistName}`;
      player.src = song.previewUrl; // reproducir preview
    }

    function generarCoordenadas() {
      const mapa = document.getElementById("mapa");
      const ancho = mapa.clientWidth - 30;
      const alto = mapa.clientHeight - 30;
      const x = Math.floor(Math.random() * ancho);
      const y = Math.floor(Math.random() * alto);
      return {x, y};
    }

    function nuevoTarget() {
      if (!juegoActivo) return;
      const mapa = document.getElementById("mapa");
      mapa.innerHTML = "";
      const coords = generarCoordenadas();
      const target = document.createElement("div");
      target.className = "target";
      target.style.left = coords.x + "px";
      target.style.top = coords.y + "px";
      target.onclick = () => {
        clicks++;
        const tiempo = (Date.now() - startTime) / 1000;
        if (tiempo < bestTime) {
          bestTime = tiempo;
          localStorage.setItem("bestTime", bestTime);
        }
        info.textContent =
          `Clicks: ${clicks} | Tiempo: ${tiempo.toFixed(2)}s | Mejor: ${bestTime.toFixed(2)}s`;
        nuevoTarget();
      };
      mapa.appendChild(target);
    }

    // Cuando termina la canción → fin del juego
    player.onended = () => {
      juegoActivo = false;
      const tiempoTotal = (Date.now() - startTime) / 1000;
      info.textContent += ` | Juego terminado en ${tiempoTotal.toFixed(2)}s`;
      document.getElementById("mapa").innerHTML = "";
    };

    nuevoTarget();
  </script>
</body>
</html>
